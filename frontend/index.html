<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoviVerso MC | Verificación</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poiret+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0000 0%, #2d0000 25%, #4a0000 50%, #1a0000 75%, #000000 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: linear-gradient(145deg, rgba(20, 0, 0, 0.85), rgba(5, 0, 0, 0.9));
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 50px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 50, 50, 0.25);
            animation: fadeInUp 0.9s ease-out;
        }

        .icon-wrapper {
            margin-bottom: 20px;
        }

        .icon-wrapper i {
            font-size: 70px;
            background: linear-gradient(135deg, #ff3333, #990000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand {
            font-family: 'Poiret One', cursive;
            font-size: 28px;
            font-weight: 600;
            font-style: italic;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ff6666, #ff0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #ff4444, #cc0000, #660000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }

        .subtitle {
            color: rgba(255, 200, 200, 0.7);
            font-size: 14px;
            font-style: italic;
            margin-bottom: 40px;
        }

        .btn-discord {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, #cc0000, #4a0000);
            border: none;
            border-radius: 40px;
            color: white;
            font-family: 'Poiret One', cursive;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-discord:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #ee0000, #5a0000);
            box-shadow: 0 8px 25px rgba(220, 0, 0, 0.4);
        }

        .btn-discord i {
            font-size: 24px;
        }

        .loading {
            display: none;
            margin-top: 20px;
            color: #ff8888;
            font-style: italic;
        }

        .discord-badge {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 50, 50, 0.2);
            font-size: 12px;
            color: rgba(255, 180, 180, 0.5);
        }

        @media (max-width: 480px) {
            .card { padding: 35px 22px; }
            .brand { font-size: 22px; }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrapper">
            <i class="fab fa-discord"></i>
        </div>
        
        <div class="brand">𝑴𝒐𝒗𝒊𝑽𝒆𝒓𝒔𝒐 𝑴𝑪</div>
        <h1>Verificación</h1>
        <p class="subtitle">Verifica tu cuenta para acceder al servidor</p>
        
        <!-- Solo un botón - redirige a la función auth de Netlify -->
        <a href="/.netlify/functions/auth" class="btn-discord">
            <i class="fab fa-discord"></i>
            Verificar con Discord
        </a>
        
        <div id="loading" class="loading">
            <i class="fas fa-spinner fa-spin"></i> Verificando...
        </div>
        
        <div class="discord-badge">
            <i class="fas fa-shield-alt"></i> Verificación oficial · MoviVerso MC
        </div>
    </div>

    <script>
        document.querySelector('.btn-discord').addEventListener('click', function() {
            document.getElementById('loading').style.display = 'block';
        });
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'access_denied') {
            document.getElementById('loading').style.display = 'none';
            alert('Verificación cancelada. Por favor intenta de nuevo.');
        }
    </script>
</body>
</html>
